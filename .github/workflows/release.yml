name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    name: Build release binaries
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: bounce
            asset_name: bounce-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact_name: bounce
            asset_name: bounce-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: bounce
            asset_name: bounce-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: bounce.exe
            asset_name: bounce-windows-x86_64.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare asset (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          mkdir -p release-bin
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} release-bin/
          cd release-bin
          tar -czvf ../${{ matrix.asset_name }}.tar.gz ${{ matrix.artifact_name }}

      - name: Prepare asset (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir release-bin
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} release-bin\
          cd release-bin
          Compress-Archive -Path ${{ matrix.artifact_name }} -DestinationPath ..\${{ matrix.asset_name }}.zip

      - name: Upload binaries to Release
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ${{ matrix.os == 'windows-latest' && format('{0}.zip', matrix.asset_name) || format('{0}.tar.gz', matrix.asset_name) }}
          asset_name: ${{ matrix.os == 'windows-latest' && format('{0}.zip', matrix.asset_name) || format('{0}.tar.gz', matrix.asset_name) }}
          tag: ${{ github.ref }}
          overwrite: true
